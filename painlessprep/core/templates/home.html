{% extends "base.html" %} 
{% block title %} Home Page {% endblock %}  

{% block content %}
<div class="container-sm border border-secondary border-2 rounded shadow p-2 my-3" 
    id="videoPlaceholder" name="videoPlaceholder"
    style="width: 480px; height: 640px;">

    <p style="text-align: center;">This is a placeholder for the video element</p>
</div>

<div class="d-flex justify-content-center gap-4 my-5" id="buttonContainer" name="buttonContainer">
    <form method="POST" action="{% url 'run_calibration' %}">
        {% csrf_token %}
        <button type="submit" style="border-radius: 10px;">▶ Run Calibration Script</button>
    </form>
    <form method="POST" action="{% url 'run_detection' %}">
        {% csrf_token %}
        <button type="submit" style="border-radius: 10px;">▶ Run Detection Script</button>
    </form>
</div>
{% endblock %}
